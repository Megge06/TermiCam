version: "2"
run:
  concurrency: 4
linters:
  default: none
  enable:
    - errcheck
    - gosec
    - govet
    - misspell
    - staticcheck
    - unused
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
